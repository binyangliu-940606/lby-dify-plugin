identity:
  name: patch_title_page_docx
  author: qq
  icon: icon.svg
  label:
    en_US: Patch title page docx
    zh_Hans: 修补Title page docx
description:
  human:
    en_US: Patch the original Title page docx without rebuilding the whole document.
    zh_Hans: 基于原始Title page docx做局部修改，不重建全文。
  llm: >-
    Patch the original Title page docx conservatively. Only replace the matched
    corresponding author email when safe, optionally add a co-corresponding
    author, and replace or append the back matter block. Preserve the rest of the
    original document.
parameters:
  - name: source_file_url
    type: string
    required: true
    label:
      en_US: Source title page file
      zh_Hans: 原始Title page文件
    human_description:
      en_US: Original title page docx file.
      zh_Hans: 原始Title page docx文件。
  - name: submission_contact
    type: string
    required: true
    label:
      en_US: Submission contact
      zh_Hans: 投稿邮箱信息
    human_description:
      en_US: Submission contact string that contains author name and email.
      zh_Hans: 含投稿邮箱作者姓名和邮箱的文本。
  - name: patch_json
    type: string
    required: true
    label:
      en_US: Patch json
      zh_Hans: 局部修改清单JSON
    human_description:
      en_US: Strict JSON patch generated by the upstream LLM node.
      zh_Hans: 上游LLM节点生成的严格JSON补丁。
  - name: output_filename
    type: string
    required: false
    default: Title_page_patched.docx
    label:
      en_US: Output filename
      zh_Hans: 输出文件名
    human_description:
      en_US: Output docx file name.
      zh_Hans: 输出docx文件名。
output_schema:
  type: object
  properties:
    files:
      type: array
      items:
        type: object
    qc_report:
      type: string
extra:
  python:
    source: tools/title_page_patcher_plugin_yujing/patch_title_page_docx.py
    
